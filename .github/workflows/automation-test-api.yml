name: Trigger Automation Tests

on:
  push:
    branches:
      - main

jobs:
  trigger-automation:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger API automation repo
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.AUTOMATION_REPO_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'YOUR_GITHUB_USERNAME_OR_ORG',
              repo: 'api-automation',
              event_type: 'application-merged',
              client_payload: {
                suite: 'all',
                app_repository: context.repo.repo,
                app_sha: context.sha,
                app_ref: context.ref
              }
            })